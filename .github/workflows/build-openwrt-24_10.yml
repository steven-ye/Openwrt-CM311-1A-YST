name: Build OpenWrt 24.10 for CM311-1a (BLE HID Support)

# 触发条件：手动触发（推荐）/ 推送代码
on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Select the source branch"
        required: false
        default: "immortalwrt-24.10.5"
        type: choice
        options:
          - openwrt-main
          - openwrt-24.10.5
          - immortalwrt-master
          - immortalwrt-24.10.5
          - lede-master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      # 1. 环境准备（CM311-1a 编译依赖）
      - name: Prepare build env for CM311-1a
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget \
          libelf-dev liblzma-dev swig python3-pip patchelf device-tree-compiler

      # 2. 克隆 OpenWrt 24.10 源码（适配晶晨 S905L3A）
      - name: Clone OpenWrt 24.10 source
        run: |
          git clone -b openwrt-24.10 --single-branch https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          # 添加晶晨 s905l3a 补丁（CM311-1a 核心）
          wget -O target/linux/amlogic/patches-6.6/999-cm311-1a-s905l3a.patch https://raw.githubusercontent.com/ophub/amlogic-s9xxx-openwrt/main/patchs/openwrt-24.10/999-cm311-1a-s905l3a.patch
          # 更新 feeds 并强制安装
          ./scripts/feeds update -a && ./scripts/feeds install -a -f

      # 3. 生成 CM311-1a 专属配置（核心）
      - name: Generate CM311-1a .config
        run: |
          cd openwrt
          # CM311-1a 基础配置（晶晨 amlogic/s905x3 架构）
          make defconfig TARGET=amlogic TARGET_SUBTARGET=s905x3

          # 关键：CM311-1a + BLE HID 核心配置
          cat >> .config << EOF
          # === CM311-1a 硬件适配 ===
          CONFIG_TARGET_amlogic=y
          CONFIG_TARGET_amlogic_s905x3=y
          CONFIG_TARGET_amlogic_s905x3_DEVICE_phicomm-n1=y  # 兼容 CM311-1a
          CONFIG_KMOD_AMLOGIC_BT=y  # 晶晨蓝牙驱动
          CONFIG_KMOD_AMLOGIC_USBNET=y  # USB 网卡（CM311-1a 必备）

          # === 蓝牙 & BLE HID 核心 ===
          CONFIG_BT=y
          CONFIG_BT_LE=y
          CONFIG_BT_BREDR=y
          CONFIG_BT_HIDP=y
          CONFIG_BT_HID=y
          CONFIG_BT_GATT=y
          CONFIG_KMOD_BTSDIO=y  # CM311-1a 板载蓝牙（SDIO 接口）
          CONFIG_KMOD_BLUETOOTH_USB=y  # 备用 USB 蓝牙适配器

          # === HID 输入子系统 ===
          CONFIG_KMOD_INPUT_CORE=y
          CONFIG_KMOD_INPUT_EVDEV=y
          CONFIG_KMOD_HID=y
          CONFIG_KMOD_HID_GENERIC=y
          CONFIG_KMOD_HIDRAW=y
          CONFIG_KMOD_INPUT_MOUSE=y  # 鼠标输入支持
          CONFIG_KMOD_INPUT_KEYBOARD=y

          # === BLE HID over GATT (hogd) ===
          CONFIG_PACKAGE_bluez=y
          CONFIG_PACKAGE_bluez-daemon=y
          CONFIG_PACKAGE_bluez-libs=y
          CONFIG_PACKAGE_bluez-btattach=y
          CONFIG_PACKAGE_hid-over-gatt=y
          CONFIG_PACKAGE_hogd=y

          # === 实用工具 & Luci 界面 ===
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_wget=y
          CONFIG_PACKAGE_bluetoothctl=y
          EOF

          # 加载配置并验证 CM311-1a 关键选项
          make defconfig
          echo "=== 验证 CM311-1a + BLE HID 配置 ==="
          cat .config | grep -E "amlogic|s905x3|btsdio|hogd|hid-over-gatt|BT_LE"

      # 4. 编译 CM311-1a 固件（优化编译速度）
      - name: Build OpenWrt 24.10 for CM311-1a
        run: |
          cd openwrt
          # 预下载所有依赖包（避免网络中断）
          make -j$(nproc) download V=s
          # 编译（失败时单线程重试，适配 CM311-1a 编译特性）
          make -j$(nproc) V=s || make -j1 V=s

      # 5. 上传 CM311-1a 固件（含刷机脚本）
      - name: Upload CM311-1a firmware
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-24.10-CM311-1a-${{ github.run_id }}
          path: |
            openwrt/bin/targets/amlogic/s905x3/*.img.gz
            openwrt/bin/targets/amlogic/s905x3/*.bin
            openwrt/bin/targets/amlogic/s905x3/*.tar.gz
            openwrt/bin/targets/amlogic/s905x3/*factory*