name: Build OpenWrt 24.10 for CM311-1a

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release 标签（如 v24.10-cm311-1a-20260306）'
        required: true
        default: 'v24.10-cm311-1a'
      release_name:
        description: 'Release 显示名称'
        required: true
        default: 'OpenWrt 24.10 for CM311-1a (BLE HID 支持)'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      # 1. 提取 OpenWrt 主版本
      - name: Extract main version
        id: version
        run: |
          FULL_VERSION="24.10.5"
          MAIN_VERSION=$(echo "$FULL_VERSION" | awk -F '.' '{print $1"."$2}')
          echo "main_version=$MAIN_VERSION" >> $GITHUB_OUTPUT

      # 2. 环境准备（适配 Ubuntu 24.04 + 修复 curl 下载）
      - name: Prepare build environment
        run: |
          sudo apt update && sudo apt upgrade -y
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev rsync unzip zlib1g-dev file wget \
          libelf-dev liblzma-dev swig python3-pip patchelf device-tree-compiler \
          python3-setuptools python3-dev libffi-dev pkg-config python3-venv
          sudo ln -sf /usr/bin/python3 /usr/bin/python
          sudo pip3 install setuptools==65.5.0 wheel
          # 禁用 HTTP/2
          echo 'alias curl="curl --http1.1"' >> ~/.bashrc
          source ~/.bashrc

      # 3. 克隆源码 + 修复 CM311-1a 补丁路径
      - name: Clone OpenWrt & Fix Patch
        run: |
          git clone -b openwrt-${{ steps.version.outputs.main_version }} --single-branch https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          PATCH_DIR="target/linux/amlogic/patches-6.6"
          mkdir -p $PATCH_DIR
          wget -O $PATCH_DIR/999-cm311-1a-s905l3a.patch \
          https://raw.githubusercontent.com/ophub/amlogic-s9xxx-openwrt/main/patchs/openwrt-24.10/999-cm311-1a-s905l3a.patch \
          || echo "CM311-1a 补丁下载失败，使用兼容配置"
          # 替换下载源
          cp feeds.conf.default feeds.conf.default.bak
          sed -i 's|mirror.nju.edu.cn/immortalwrt|downloads.immortalwrt.org|g' feeds.conf.default
          ./scripts/feeds update -a -t 300 --force || ./scripts/feeds update -a -t 300 --force
          ./scripts/feeds install -a -f

      # 4. 生成 CM311-1a 配置
      - name: Generate CM311-1a .config
        run: |
          cd openwrt
          make defconfig TARGET=amlogic TARGET_SUBTARGET=s905x3
          cat >> .config << EOF
          # 基础硬件配置（S905L3A 核心）
          CONFIG_TARGET_amlogic=y
          CONFIG_TARGET_amlogic_s905l3a=y
          CONFIG_TARGET_amlogic_s905l3a_DEVICE_cm311-1a=y
          CONFIG_KERNELVERSION="${{ github.event.inputs.kernel_ver }}"
          CONFIG_TARGET_ROOTFS_EXT4FS=y
          CONFIG_TARGET_ROOTFS_SIZE=1024
          
          # S905L3A 蓝牙驱动（关键修正）
          CONFIG_PACKAGE_kmod-bluetooth=y
          CONFIG_PACKAGE_kmod-bluetooth-hid=y
          CONFIG_PACKAGE_kmod-btsdio=y
          CONFIG_PACKAGE_kmod-hid-generic=y
          CONFIG_PACKAGE_kmod-hid-meson=y
          CONFIG_PACKAGE_kmod-input-evdev=y
          CONFIG_PACKAGE_kmod-input-uinput=y
          CONFIG_PACKAGE_kmod-uart-amlogic=y
          
          # 解决依赖缺失的核心工具（编译进固件）
          CONFIG_PACKAGE_rtk-hciattach=y
          CONFIG_PACKAGE_bluez=y
          CONFIG_PACKAGE_bluez-utils=y
          CONFIG_PACKAGE_bluealsa=y
          
          # 遥控测试/配置工具
          CONFIG_PACKAGE_evtest=y
          CONFIG_PACKAGE_ir-keytable=y
          CONFIG_PACKAGE_lircd=y
          
          # 基础 LuCI 界面（方便配置）
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-app-bluetooth=y
          CONFIG_PACKAGE_luci-theme-argon=y
          EOF
          make defconfig

      # 5. 编译固件（增加失败检测）
      - name: Build OpenWrt firmware
        id: build_check
        continue-on-error: true  # 编译失败不中断脚本
        run: |
          cd openwrt
          export DL_CMD="curl --http1.1 -f --retry 5 --retry-delay 3 -o"
          make -j$(nproc) download V=s || make -j1 download V=s
          make -j$(($(nproc)-1)) V=s || make -j1 V=s
          # 编译成功标记
          echo "build_success=true" >> $GITHUB_OUTPUT

      # 6. 自动识别固件目录 + 重命名（核心修复）
      - name: Find & Rename firmware
        id: package
        if: steps.build_check.outputs.build_success == 'true'  # 仅编译成功时执行
        run: |
          cd openwrt
          # 核心：自动查找 amlogic 架构的固件目录（兼容 s905x3/s905l3 等子目录）
          FIRMWARE_DIR=$(find bin/targets/amlogic/ -type d -name "*s905*" | head -n 1)
          if [ -z "$FIRMWARE_DIR" ]; then
            # 若未找到，使用默认目录
            FIRMWARE_DIR="bin/targets/amlogic/s905x3"
            mkdir -p $FIRMWARE_DIR
          fi
          echo "固件目录：$FIRMWARE_DIR"
          
          # 查找固件文件（兼容 img.gz/bin 格式）
          FIRMWARE_FILE=$(find $FIRMWARE_DIR -name "*.img.gz" | head -n 1)
          if [ -z "$FIRMWARE_FILE" ]; then
            FIRMWARE_FILE=$(find $FIRMWARE_DIR -name "*.bin" | head -n 1)
          fi
          
          # 检查固件是否存在
          if [ -z "$FIRMWARE_FILE" ]; then
            echo "未找到固件文件！"
            exit 1
          fi
          
          # 重命名固件
          FIRMWARE_NEW="$FIRMWARE_DIR/OpenWrt-24.10-CM311-1a-$(date +%Y%m%d).img.gz"
          mv $FIRMWARE_FILE $FIRMWARE_NEW
          
          # 输出路径
          echo "firmware_path=$FIRMWARE_NEW" >> $GITHUB_OUTPUT
          echo "firmware_name=$(basename $FIRMWARE_NEW)" >> $GITHUB_OUTPUT
          ls -l $FIRMWARE_NEW

      # 7. 上传固件到 Release（仅编译成功时执行）
      - name: Upload the packaged OpenWrt
        if: steps.build_check.outputs.build_success == 'true'
        uses: ncipollo/release-action@main
        with:
          tag: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_name }}
          body: |
            ## OpenWrt 24.10 适配 CM311-1a
            - 硬件：CM311-1a (S905L3A)
            - 核心功能：支持非标准 BLE 蓝牙鼠标（内置 bluez-daemon/bluez-utils）
            - 内核版本：6.6
            - 编译环境：Ubuntu 24.04
            - 固件名称：${{ steps.package.outputs.firmware_name }}
          artifacts: ${{ steps.package.outputs.firmware_path }}
          allowUpdates: true
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      # 8. 编译失败提醒
      - name: Build failed notification
        if: steps.build_check.outputs.build_success != 'true'
        run: |
          echo "===== 固件编译失败 ====="
          # 输出编译日志（便于排查）
          cat openwrt/build.log || echo "无编译日志"
          exit 1