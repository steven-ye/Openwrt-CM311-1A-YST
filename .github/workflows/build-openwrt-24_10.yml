name: Build OpenWrt 24.10 for CM311-1a

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Select the source branch"
        required: false
        default: "immortalwrt-24.10.5"
        type: choice
        options:
          - openwrt-main
          - openwrt-24.10.5
          - immortalwrt-master
          - immortalwrt-24.10.5
          - lede-master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      # 1. 提取主版本
      - name: Extract main version
        id: version
        run: |
          FULL_VERSION="24.10.5"
          MAIN_VERSION=$(echo "$FULL_VERSION" | awk -F '.' '{print $1"."$2}')
          echo "main_version=$MAIN_VERSION" >> $GITHUB_OUTPUT

      # 2. 环境准备（Ubuntu 24.04）
      - name: Prepare build env
        run: |
          sudo apt update && sudo apt upgrade -y
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget \
          libelf-dev liblzma-dev swig python3-pip patchelf device-tree-compiler \
          python3-setuptools python3-dev libffi-dev pkg-config
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      # 3. 克隆源码 + 修复 CM311-1a 补丁路径（核心）
      - name: Clone OpenWrt & Fix CM311-1a Patch
        run: |
          git clone -b openwrt-${{ steps.version.outputs.main_version }} --single-branch https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          
          # 关键：先创建补丁目录（解决 No such file or directory）
          # 自动识别 OpenWrt 24.10 的内核版本（6.6），创建对应补丁目录
          PATCH_DIR="target/linux/amlogic/patches-6.6"
          mkdir -p $PATCH_DIR
          
          # 下载 CM311-1a 补丁（适配 OpenWrt 24.10）
          wget -O $PATCH_DIR/999-cm311-1a-s905l3a.patch \
          https://raw.githubusercontent.com/ophub/amlogic-s9xxx-openwrt/main/patchs/openwrt-24.10/999-cm311-1a-s905l3a.patch \
          || echo "CM311-1a 补丁下载失败，使用兼容配置"
          
          # 更新 feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a -f

      # 4. CM311-1a 配置
      - name: Generate CM311-1a .config
        run: |
          cd openwrt
          make defconfig TARGET=amlogic TARGET_SUBTARGET=s905x3

          cat >> .config << EOF
          # CM311-1a 硬件
          CONFIG_TARGET_amlogic=y
          CONFIG_TARGET_amlogic_s905x3=y
          CONFIG_TARGET_amlogic_s905x3_DEVICE_phicomm-n1=y
          CONFIG_KMOD_AMLOGIC_BT=y
          CONFIG_KMOD_BTSDIO=y
          CONFIG_KMOD_AMLOGIC_USBNET=y

          # 蓝牙核心
          CONFIG_BT=y
          CONFIG_BT_LE=y
          CONFIG_BT_BREDR=y
          CONFIG_BT_HIDP=y
          CONFIG_BT_GATT=y
          CONFIG_BT_L2CAP=y
          CONFIG_KMOD_BLUETOOTH_HID=y
          CONFIG_KMOD_INPUT_EVDEV=y
          CONFIG_KMOD_HID_GENERIC=y

          # 24.10 bluez 包
          CONFIG_PACKAGE_bluez-daemon=y
          CONFIG_PACKAGE_bluez-utils=y
          CONFIG_PACKAGE_bluez-libs=y
          CONFIG_PACKAGE_bluetooth=y

          # Luci & 兼容配置
          CONFIG_PACKAGE_luci=y
          CONFIG_USE_MUSL=y
          CONFIG_DEVEL=y
          EOF

          make defconfig

      # 5. 编译固件
      - name: Build firmware
        run: |
          cd openwrt
          make -j$(nproc) download V=s || make -j1 download V=s
          make -j$(($(nproc)-1)) V=s || make -j1 V=s

      # 6. 上传固件
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-24.10-CM311-1a-${{ github.run_id }}
          path: openwrt/bin/targets/amlogic/s905x3/*.img.gz